name: Makefile CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NVIM_VERSION: v0.11.6

    steps:
    - uses: actions/checkout@v4

    - name: Install Neovim
      run: |
        wget -q https://github.com/neovim/neovim/releases/download/${NVIM_VERSION}/nvim-linux-x86_64.tar.gz
        tar xzf nvim-linux-x86_64.tar.gz
        sudo mv nvim-linux-x86_64 /opt/nvim
        sudo ln -s /opt/nvim/bin/nvim /usr/local/bin/nvim

    - name: Install plenary.nvim
      run: |
        git clone --depth 1 https://github.com/nvim-lua/plenary.nvim.git ../plenary.nvim

    - name: Install nui.nvim
      run: |
        git clone --depth 1 https://github.com/MunifTanjim/nui.nvim.git ../nui.nvim

    - name: Verify plugin loads
      run: nvim --headless -c "set rtp+=../plenary.nvim,../nui.nvim,." -c "lua require('vibelearn').setup()" -c "qa"